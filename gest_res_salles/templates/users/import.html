{% extends "base.html" %}

{% block content %}
<div class="container mt-5">
    <div class="card shadow">
        <div class="card-header bg-primary text-white">
            <h3>Importer des Utilisateurs (CSV)</h3>
        </div>
        <div class="card-body">
            <p>Le fichier CSV doit contenir les colonnes : <strong>email, username, role, telephone, matricule</strong>.</p>
            
            <form method="post" enctype="multipart/form-data">
                {% csrf_token %}
                <div class="mb-3">
                    <label for="csv_file" class="form-label">Sélectionner le fichier CSV</label>
                    <input type="file" name="csv_file" id="csv_file" class="form-control" accept=".csv" required>
                </div>
                <button type="submit" class="btn btn-success">Lancer l'importation</button>
                <a href="{% url 'user_list' %}" class="btn btn-secondary">Annuler</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
