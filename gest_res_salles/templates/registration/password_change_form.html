{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Nouveau mot de passe</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #ffffff; border-top: 8px solid #198754; }
        .form-container { max-width: 500px; margin-top: 50px; }
        .alert-info { border-left: 5px solid #198754; background-color: #e9f7ef; color: #198754; }
    </style>
</head>
<body>
    <div class="container form-container">
        <div class="text-center mb-4">
            <h3 class="fw-bold">Sécurité du compte</h3>
            <div class="alert alert-info mt-3 text-start">
                Par mesure de sécurité, vous devez changer votre mot de passe pour continuer.
            </div>
        </div>
        
        <form method="post" class="shadow-sm p-4 border rounded bg-light">
            {% csrf_token %}
            {% for field in form %}
                <div class="mb-3">
                    <label class="form-label text-dark fw-semibold">{{ field.label }}</label>
                    {{ field }}
                    {% if field.help_text %}
                        <div class="form-text text-muted" style="font-size: 0.8rem;">{{ field.help_text }}</div>
                    {% endif %}
                </div>
            {% endfor %}
            <button type="submit" class="btn btn-success w-100 mt-2">Mettre à jour mon mot de passe</button>
        </form>
    </div>
</body>
</html>
